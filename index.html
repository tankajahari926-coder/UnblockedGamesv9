<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unblocked Games v9</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #0d0d0d; color: white; margin: 0; padding: 0; }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 15px 30px; background-color: #1a1a1a; border-bottom: 3px solid #007bff; }
        .logo { font-size: 22px; font-weight: bold; color: #007bff; text-transform: uppercase; letter-spacing: 2px; }
        #searchBar { padding: 10px 15px; border-radius: 20px; border: 1px solid #333; width: 280px; background: #222; color: white; outline: none; transition: 0.3s; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 25px; padding: 40px; }
        .game-card { background: #1a1a1a; border-radius: 12px; overflow: hidden; cursor: pointer; transition: 0.3s; text-align: center; border: 1px solid #222; padding-bottom: 15px; }
        .game-card:hover { transform: translateY(-8px); border-color: #007bff; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .game-card img { width: 100%; height: 150px; object-fit: cover; background: #111; }
        .game-card p { margin: 15px 10px 0 10px; font-weight: 600; font-size: 16px; }

        #gameContainer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 999; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .controls { width: 90%; max-width: 1200px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        #closeBtn { padding: 10px 25px; background: #ff4444; color: white; border: none; cursor: pointer; font-weight: bold; border-radius: 5px; }
        .iframe-wrapper { width: 90%; height: 80%; max-width: 1200px; background: #000; border: 2px solid #333; }
        #gameFrame { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">GamesV9 Hub</div>
        <input type="text" id="searchBar" placeholder="Search for a game..." onkeyup="filterGames()">
    </nav>

    <div id="gameGrid" class="grid">
        <!-- Game cards appear here -->
    </div>

    <div id="gameContainer">
        <div class="controls">
            <h2 id="currentGameTitle" style="margin:0;">Loading...</h2>
            <button onclick="closeGame()" id="closeBtn">EXIT GAME [X]</button>
        </div>
        <div class="iframe-wrapper">
            <iframe id="gameFrame" src="" allowfullscreen allow="autoplay; fullscreen" spellcheck="false"></iframe>
        </div>
    </div>

    <script>
        // --- YOUR GAME DATABASE ---
        // Added Five Nights at Epsteins here
        const gamesData = [
            { 
                "title": "Five Nights at Epsteins", 
                "thumbnail": "https://via.placeholder.com/200x150/1a1a1a/007bff?text=FNAE", 
                "url": "./FNAE-HTML5-1.2.3/index.html?autostart=1" 
            }
        ];

        function displayGames(games) {
            const grid = document.getElementById('gameGrid');
            grid.innerHTML = '';
            
            if (games.length === 0) {
                grid.innerHTML = '<div style="grid-column: 1/-1; text-align:center; padding: 50px;"><h1>No Games Found</h1></div>';
                return;
            }
            
            games.forEach(game => {
                const card = document.createElement('div');
                card.className = 'game-card';
                card.innerHTML = `
                    <img src="${game.thumbnail}" alt="${game.title}">
                    <p>${game.title}</p>
                `;
                card.onclick = () => openGame(game.url, game.title);
                grid.appendChild(card);
            });
        }

        function filterGames() {
            const term = document.getElementById('searchBar').value.toLowerCase();
            const filtered = gamesData.filter(g => g.title.toLowerCase().includes(term));
            displayGames(filtered);
        }

        function openGame(url, title) {
            document.getElementById('gameFrame').src = url;
            document.getElementById('currentGameTitle').innerText = title;
            document.getElementById('gameContainer').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeGame() {
            document.getElementById('gameFrame').src = '';
            document.getElementById('gameContainer').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        // Initialize the page
        window.onload = () => displayGames(gamesData);
    </script>
</body>
</html>
