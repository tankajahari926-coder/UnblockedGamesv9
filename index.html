<!DOCTYPE html>
<html>
<head>
    <title>Unblocked Games v9</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; }
        .grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 20px; }
        .game { border: 2px solid #444; padding: 10px; cursor: pointer; border-radius: 10px; width: 200px; }
        .game:hover { border-color: #007bff; }
        #player { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: none; flex-direction: column; }
        iframe { width: 100%; height: 100%; border: none; }
        button { background: red; color: white; padding: 15px; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Unblocked Games v9</h1>
    <div class="grid" id="g"></div>
    <div id="player">
        <button onclick="location.reload()">CLOSE GAME</button>
        <iframe id="f"></iframe>
    </div>
    <script>
        const data = [
            {t:"Slope", u:"https://way66.github.io/slope/"},
            {t:"Retro Bowl", u:"https://game316024.konggames.com/gameproviderv2/v1/index.html"},
            {t:"1v1 LOL", u:"https://1v1.lol/"}
        ];
        const grid = document.getElementById('g');
        data.forEach(game => {
            const div = document.createElement('div');
            div.className = 'game';
            div.innerHTML = `<h3>${game.t}</h3>`;
            div.onclick = () => {
                document.getElementById('f').src = game.u;
                document.getElementById('player').style.display = 'flex';
            };
            grid.appendChild(div);
        });
    </script>
</body>
</html>
