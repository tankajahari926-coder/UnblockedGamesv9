<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unblocked Games v9</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #121212; color: white; margin: 0; padding: 0; }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 10px 30px; background-color: #1f1f1f; border-bottom: 3px solid #007bff; }
        .logo { font-size: 24px; font-weight: bold; color: #007bff; }
        #searchBar { padding: 10px; border-radius: 5px; border: none; width: 250px; background: #333; color: white; outline: none; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; padding: 30px; }
        .game-card { background: #1f1f1f; border-radius: 10px; overflow: hidden; cursor: pointer; transition: 0.3s; text-align: center; border: 1px solid #333; padding-bottom: 10px; }
        .game-card:hover { transform: translateY(-5px); border-color: #007bff; }
        .game-card img { width: 100%; height: 140px; object-fit: cover; background: #222; }
        
        /* PLAYER OVERLAY */
        #gameContainer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 100; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .iframe-wrapper { width: 90%; height: 80%; background: #000; border: 2px solid #444; }
        #gameFrame { width: 100%; height: 100%; border: none; }
        .controls { width: 90%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        #closeBtn { padding: 10px 20px; background: #ff4444; color: white; border: none; cursor: pointer; font-weight: bold; border-radius: 5px; }
        .empty-msg { text-align: center; width: 100%; margin-top: 50px; color: #777; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">GamesV9</div>
        <input type="text" id="searchBar" placeholder="Search games..." onkeyup="filterGames()">
    </nav>

    <div id="gameGrid" class="grid">
        <!-- Games will appear here -->
    </div>

    <!-- The Game Player -->
    <div id="gameContainer">
        <div class="controls">
            <h2 id="currentGameTitle" style="margin:0;">Game</h2>
            <button onclick="closeGame()" id="closeBtn">CLOSE GAME [X]</button>
        </div>
        <div class="iframe-wrapper">
            <iframe id="gameFrame" src="" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        // --- ADD YOUR GAMES HERE ---
        const gamesData = [
            // Example format:
            // { "title": "Game Name", "thumbnail": "image_url.jpg", "url": "iframe_url_here" }
        ];

        function displayGames(games) {
            const grid = document.getElementById('gameGrid');
            grid.innerHTML = '';
            
            if (games.length === 0) {
                grid.innerHTML = '<div class="empty-msg"><h1>No games added yet.</h1><p>Edit your index.html to add games to the gamesData list.</p></div>';
                return;
            }
            
            games.forEach(game => {
                const card = document.createElement('div');
                card.className = 'game-card';
                card.innerHTML = `<img src="${game.thumbnail || 'https://via.placeholder.com/200x140?text=No+Image'}"><p><b>${game.title}</b></p>`;
                card.onclick = () => openGame(game.url, game.title);
                grid.appendChild(card);
            });
        }

        function filterGames() {
            const term = document.getElementById('searchBar').value.toLowerCase();
            const filtered = gamesData.filter(g => g.title.toLowerCase().includes(term));
            displayGames(filtered);
        }

        function openGame(url, title) {
            document.getElementById('gameFrame').src = url;
            document.getElementById('currentGameTitle').innerText = title;
            document.getElementById('gameContainer').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeGame() {
            document.getElementById('gameFrame').src = '';
            document.getElementById('gameContainer').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        window.onload = () => displayGames(gamesData);
    </script>
</body>
</html>
