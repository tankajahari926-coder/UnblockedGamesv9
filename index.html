<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unblocked Games v9</title>
    <style>
        body { font-family: sans-serif; background: #0d0d0d; color: white; margin: 0; padding: 0; }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 15px 30px; background: #1a1a1a; border-bottom: 3px solid #007bff; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; padding: 40px; }
        .game-card { background: #1a1a1a; border-radius: 10px; cursor: pointer; border: 1px solid #333; text-align: center; }
        .game-card:hover { border-color: #007bff; }
        .game-card img { width: 100%; height: 140px; object-fit: cover; }
        #player { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .iframe-wrapper { width: 90%; height: 80%; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }
        #closeBtn { padding: 10px 20px; background: red; color: white; border: none; cursor: pointer; margin-bottom: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <nav>
        <div style="font-weight:bold; font-size:20px;">UnblockedGamesV9</div>
    </nav>

    <div id="gameGrid" class="grid"></div>

    <div id="player">
        <button onclick="closeGame()" id="closeBtn">EXIT GAME [X]</button>
        <div class="iframe-wrapper">
            <iframe id="gameFrame" allowfullscreen allow="autoplay; fullscreen"></iframe>
        </div>
    </div>

    <script>
        // Use window.location to find the exact path of your repo
        const repoPath = window.location.pathname.replace('index.html', '');

        const gamesData = [
            { 
                "title": "Five Nights at Epsteins", 
                "thumbnail": "https://via.placeholder.com/200x140?text=FNAE", 
                // This combines your site URL with the folder name
                "url": repoPath + "FNAE-HTML5-1.2.3/index.html" 
            }
        ];

        function displayGames() {
            const grid = document.getElementById('gameGrid');
            grid.innerHTML = '';
            gamesData.forEach(game => {
                const card = document.createElement('div');
                card.className = 'game-card';
                card.innerHTML = `<img src="${game.thumbnail}"><p>${game.title}</p>`;
                card.onclick = () => openGame(game.url);
                grid.appendChild(card);
            });
        }

        function openGame(url) {
            console.log("Attempting to load:", url); // This helps you find errors in the console
            document.getElementById('gameFrame').src = url;
            document.getElementById('player').style.display = 'flex';
        }

        function closeGame() {
            document.getElementById('gameFrame').src = '';
            document.getElementById('player').style.display = 'none';
        }

        window.onload = displayGames;
    </script>
</body>
</html>
